name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  scaffold-matrix:
    runs-on: ubuntu-latest
    needs: build-test
    strategy:
      fail-fast: false
      matrix:
        boilerplate:
          - node-service
          - express-api
          - fastify-api
          - nextjs-app
          - python-service
          - react-native-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Scaffold ${{ matrix.boilerplate }}
        run: |
          set -euo pipefail
          TARGET="/tmp/ci-${{ matrix.boilerplate }}"
          node dist/cli.js new "${{ matrix.boilerplate }}" "$TARGET" --agents claude,cursor
          test -f "$TARGET/skills.lock"
          test -d "$TARGET/.bwai/skills"
          test -f "$TARGET/.github/workflows/skill-scan.yml"
          test -f "$TARGET/.claude/skills/test-driven-development/SKILL.md" || \
            test -f "$TARGET/.claude/skills/code-review/SKILL.md" || \
            test -f "$TARGET/.claude/skills/nextjs-app-router/SKILL.md" || \
            test -f "$TARGET/.claude/skills/react-native-development/SKILL.md"
          if [ "${{ matrix.boilerplate }}" = "react-native-app" ]; then
            test ! -d "$TARGET/workflows"
          else
            test -f "$TARGET/workflows/bwai-delivery/workflow.json"
          fi
      - name: bwai doctor
        run: node dist/cli.js doctor

  safety-gate:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: astral-sh/setup-uv@v5
      - run: npm ci
      - run: npm run build
      - name: Install SkillSpector
        run: uv tool install git+https://github.com/NVIDIA/skillspector.git
      - name: Add uv tools to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Scan catalog skills
        run: node dist/cli.js scan-catalog --threshold 30 --require-scanner
      - name: Scaffold and scan a demo project
        run: |
          node dist/cli.js new node-service /tmp/ci-demo --agents claude
          node dist/cli.js scan-project /tmp/ci-demo --threshold 50 --require-scanner
