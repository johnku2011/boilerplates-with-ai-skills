name: Skill discovery

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      query:
        description: Search query
        required: false
        default: security
      scan_top:
        description: Number of top results to scan with SkillSpector
        required: false
        default: "5"

permissions:
  contents: read
  issues: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: astral-sh/setup-uv@v5
      - run: npm ci
      - run: npm run build
      - name: Install SkillSpector
        run: uv tool install git+https://github.com/NVIDIA/skillspector.git
      - name: Add uv tools to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run discovery scan
        env:
          QUERY: ${{ github.event.inputs.query || 'security' }}
          SCAN_TOP: ${{ github.event.inputs.scan_top || '5' }}
          THRESHOLD: "30"
        run: |
          node dist/cli.js search-skills "$QUERY" --limit 10 --scan "$SCAN_TOP" --json > discovery-report.json
          cat discovery-report.json
      - name: Update or open promotion queue issue
        uses: actions/github-script@v7
        env:
          QUERY: ${{ github.event.inputs.query || 'security' }}
          THRESHOLD: "30"
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('discovery-report.json', 'utf8'));
            const threshold = Number(process.env.THRESHOLD || 30);
            const query = report.query || process.env.QUERY || 'security';
            const candidates = (report.candidates || []).filter(
              (c) => c.scan && c.scan.riskScore !== null && c.scan.riskScore <= threshold,
            );

            const title = `Skill discovery queue (\`${query}\`)`;
            const body = [
              'Rolling queue of external skills below the promotion threshold. **Update this issue in place** — do not open duplicates.',
              '',
              `Last run: ${new Date().toISOString()}`,
              `Query: \`${query}\``,
              `Threshold: risk score <= ${threshold}`,
              `Candidates this run: ${candidates.length}`,
              '',
              candidates.length === 0
                ? '_No new candidates below threshold on the latest run._'
                : '## Candidates',
              '',
              ...candidates.flatMap((c) =>
                c
                  ? [
                      `### ${c.fullName}`,
                      `- Source: ${c.source}`,
                      `- URL: ${c.url}`,
                      `- Stars: ${c.stars}`,
                      `- Risk score: ${c.scan.riskScore}`,
                      `- Findings: ${c.scan.findings}`,
                      '',
                      'Promote manually after review:',
                      '```bash',
                      `bwai promote <skill-name> --from-url ${c.url} --target shared --require-scanner`,
                      'bwai sync-skills',
                      'bwai scan-catalog --require-scanner',
                      '```',
                      '',
                    ]
                  : [],
              ),
              '',
              '**Triage:** close this issue when reviewed, or comment `wont-promote` / promote and close.',
              '',
              '_Generated by `.github/workflows/skill-discovery.yml`._',
            ].join('\n');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'skill-discovery',
              per_page: 100,
            });

            const existing = openIssues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `Discovery run updated (${candidates.length} candidate(s) below threshold).`,
              });
              core.info(`Updated existing issue #${existing.number}`);
              return;
            }

            if (candidates.length === 0) {
              core.info('No candidates and no open queue issue — skipping create.');
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ['skill-discovery'],
            });
