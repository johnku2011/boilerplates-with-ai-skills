name: Skill discovery

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      query:
        description: Search query
        required: false
        default: security
      scan_top:
        description: Number of top results to scan with SkillSpector
        required: false
        default: "5"

permissions:
  contents: read
  issues: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: astral-sh/setup-uv@v5
      - run: npm ci
      - run: npm run build
      - name: Install SkillSpector
        run: uv tool install git+https://github.com/NVIDIA/skillspector.git
      - name: Add uv tools to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run discovery scan
        env:
          QUERY: ${{ github.event.inputs.query || 'security' }}
          SCAN_TOP: ${{ github.event.inputs.scan_top || '5' }}
          THRESHOLD: "30"
        run: |
          node dist/cli.js search-skills "$QUERY" --limit 10 --scan "$SCAN_TOP" --json > discovery-report.json
          cat discovery-report.json
      - name: Open issue for promotion candidates
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('discovery-report.json', 'utf8'));
            const threshold = Number(process.env.THRESHOLD || 30);
            const candidates = (report.candidates || []).filter(
              (c) => c.scan && c.scan.riskScore !== null && c.scan.riskScore <= threshold,
            );
            if (candidates.length === 0) {
              core.info('No promotion candidates below threshold.');
              return;
            }
            const title = `Skill discovery: ${candidates.length} candidate(s) for promotion`;
            const body = [
              'Automated daily discovery found skills below the promotion threshold.',
              '',
              `Query: \`${report.query}\``,
              `Threshold: risk score <= ${threshold}`,
              '',
              '## Candidates',
              '',
              ...candidates.map((c) =>
                [
                  `### ${c.fullName}`,
                  `- Source: ${c.source}`,
                  `- URL: ${c.url}`,
                  `- Stars: ${c.stars}`,
                  `- Risk score: ${c.scan.riskScore}`,
                  `- Findings: ${c.scan.findings}`,
                  '',
                  'Promote manually after review:',
                  '```bash',
                  `bwai promote <skill-name> --from-url ${c.url} --target shared --require-scanner`,
                  'bwai sync-skills',
                  'bwai scan-catalog --require-scanner',
                  '```',
                ].join('\n'),
              ),
              '',
              '_Generated by `.github/workflows/skill-discovery.yml`._',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['skill-discovery'],
            });
